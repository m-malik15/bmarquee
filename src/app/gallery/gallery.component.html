<!-- gallery.component.html -->
<app-page-shell
  title="Marquee Gallery"
  intro="Select a category to browse our marquee styles and interior options.">

  <!-- ── Loading ──────────────────────────────────────────────────────────── -->
  <div *ngIf="isLoading" class="gal-loading">
    <div class="gal-spinner"></div>
    <p>Loading gallery...</p>
  </div>

  <!-- ── Error ────────────────────────────────────────────────────────────── -->
  <div *ngIf="error && !isLoading" class="gal-error">
    <p>{{ error }}</p>
    <a routerLink="/contact-us" class="btn btn-secondary">Contact Us</a>
  </div>

  <ng-container *ngIf="!isLoading && !error">

    <div class="gallery-layout">

      <!-- ══════════════════════════════════════════════════════════════════
           SIDEBAR — vertical category list
      ═══════════════════════════════════════════════════════════════════ -->
      <nav class="cat-nav" aria-label="Marquee gallery categories">

        <p class="cat-nav__heading">Categories</p>

        <button
          *ngFor="let cat of categories"
          class="cat-nav__item"
          [class.cat-nav__item--active]="cat.id === activeId"
          [style.--cat-color]="cat.color"
          role="tab"
          [attr.aria-selected]="cat.id === activeId"
          [attr.aria-controls]="'panel-' + cat.id"
          [id]="'tab-' + cat.id"
          (click)="selectCategory(cat.id)">

          <!-- Category colour swatch -->
          <span class="cat-nav__swatch"></span>

          <!-- Icon -->
          <span class="cat-nav__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.75" width="15" height="15">
              <path [attr.d]="cat.icon"/>
            </svg>
          </span>

          <!-- Label -->
          <span class="cat-nav__label">{{ cat.label }}</span>


          <!-- Active indicator arrow -->
          <span class="cat-nav__arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" width="14" height="14">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </span>

        </button>

      </nav>

      <!-- ══════════════════════════════════════════════════════════════════
           MAIN CONTENT — slider + description
      ═══════════════════════════════════════════════════════════════════ -->
      <div class="gallery-content" *ngIf="activeCategory">

        <div
          *ngFor="let cat of categories"
          class="gallery-panel"
          [class.gallery-panel--visible]="cat.id === activeId"
          role="tabpanel"
          [id]="'panel-' + cat.id"
          [attr.aria-labelledby]="'tab-' + cat.id"
          [attr.hidden]="cat.id !== activeId ? '' : null">

          <ng-container *ngIf="cat.id === activeId">

            <!-- Panel heading -->
            <div class="gallery-panel__header">
              <div class="gallery-panel__title-row">
                <span class="gallery-panel__swatch" [style.background]="cat.color"></span>
                <h2 class="gallery-panel__title">{{ cat.label }}</h2>
              </div>
              <span class="gallery-panel__highlight">{{ cat.highlight }}</span>
            </div>

            <!-- Empty state -->
            <div *ngIf="!cat.images.length" class="gal-empty">
              <p>No images found for this category yet.</p>
            </div>

            <!-- Slider -->
            <div *ngIf="cat.images.length" class="gallery-slider-wrap">
              <app-slider
                [images]="cat.images"
                [autoplay]="true"
                [speed]="4500"
                [showCaptions]="false"
                [showDots]="true"
                [showCta]="false"
                fitMode="contain"
                [useSize]="'large'">
              </app-slider>
            </div>

            <!-- Description + CTA -->
            <div class="gallery-desc">
              <div class="gallery-desc__body">
                <p class="gallery-desc__text">{{ cat.description }}</p>
              </div>
              <a routerLink="/free-quote" class="btn btn-primary gallery-desc__cta">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" width="16" height="16">
                  <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                </svg>
                Get a Quote for {{ cat.label }}
              </a>
            </div>

          </ng-container>
        </div>

      </div><!-- /gallery-content -->

    </div><!-- /gallery-layout -->

  </ng-container>

</app-page-shell>
