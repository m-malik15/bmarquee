<!-- home.component.html -->
<!-- Home does NOT use <app-page-shell> — it has a full-width slider as its hero -->

<div class="page-container" [class.loading]="isLoading">

  <!-- Loading overlay -->
  <div *ngIf="isLoading" class="loading-overlay">
    <div class="spinner"></div>
    <p>Loading page...</p>
  </div>

  <!-- Error state -->
  <div *ngIf="error && !isLoading" class="error">
    <h2>{{ error }}</h2>
    <p>The page you're looking for could not be found.</p>
    <a routerLink="/" class="btn-home">Go to Homepage</a>
  </div>

  <!-- Page wrapper (dims while loading) -->
  <div class="page-wrapper">

    <!-- Full-width hero slider -->
    <app-slider
      *ngIf="sliderImages.length > 0 && !isLoading"
      [images]="sliderImages"
      [autoplay]="true"
      [speed]="5000"
      [showCaptions]="true"
      [showDots]="true"
      [useSize]="'large'">
    </app-slider>

    <article *ngIf="page && !isLoading" class="page">

      <!-- Cards — constrained to max-width column -->
      <div class="container" *ngIf="showCards && cardSections.length > 0">
        <app-cards-grid
          *ngFor="let section of cardSections; let i = index"
          [cards]="section"
          [columns]="3">
        </app-cards-grid>
      </div>

      <!-- WordPress page content — constrained -->
      <div class="container">
        <div class="page-content" [innerHTML]="pageContentBefore"></div>
      </div>

      <!-- CTA — full width, handled by its own component -->
      <app-cta-section
        *ngIf="showCta && ctaSection"
        [cta]="ctaSection">
      </app-cta-section>

      <!-- Clients / Accreditations — full width -->
      <app-clients-accreditations
        *ngIf="showClientsAccreditations && clientsAccreditationsSection"
        [data]="clientsAccreditationsSection">
      </app-clients-accreditations>

    </article>

  </div><!-- /.page-wrapper -->

</div><!-- /.page-container -->
